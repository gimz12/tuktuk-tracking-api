services:
  - type: web
    name: tuktuk-tracking-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: yarn install --frozen-lockfile && yarn build
    startCommand: node dist/main.js
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_DEVICE_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_DEVICE_EXPIRES_IN
        value: 30d
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: THROTTLE_TTL
        value: "60"
      - key: THROTTLE_LIMIT
        value: "120"
